apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: core
  namespace: ${mysaveid_namespace:=forgetToConfigure}
spec:
  dependsOn:
    - name: service-registry
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: core
  path: ./kubernetes/${mysaveid_env:=forgetToConfigure}
  targetNamespace: ${mysaveid_namespace:=forgetToConfigure}
  patches:
    - patch: |
        - op: replace
          path: /spec/chart/spec/sourceRef/namespace
          value: ${mysaveid_namespace:=forgetToConfigure}
      target:
          kind: HelmRelease
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: core
      namespace: ${mysaveid_namespace:=forgetToConfigure}
  timeout: 5m
  prune: true
